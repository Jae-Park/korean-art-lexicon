id: term.alternative-space
term:
  ko: 대안공간
  en:
    preferred: alternative space
    type: semantic
    alternatives:
      - form: alternative art space
        type: semantic
  hanja: 代案空間
category: phenomenon
definition:
  ko: 상업 갤러리나 공공 미술관과 구별되는 비영리 전시 공간. 한국에서는 1990년대 후반부터 등장.
  en: Non-profit exhibition spaces distinct from commercial galleries or public museums. Emerged in Korea from the late 1990s.
period:
  start: 1998
