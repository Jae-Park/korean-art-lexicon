definition:
  ko: 1980년 광주 항쟁을 계기로 본격화된 한국의 사회참여 미술 운동. 민주화 운동과 연대하며 노동자·민중의 삶을 형상화했고, 판화·걸개그림·만화 등 재생산 가능한 매체를 즐겨 사용했다. 서구 형식주의에 반대하고 한국의 전통 시각문화를 계승하려 했다.
  en: A South Korean socio-political art movement that intensified following the 1980 Gwangju Uprising. Artists aligned with the democratization movement, depicting the lives of workers and ordinary people, and favored reproducible media such as woodblock prints, banners, and pamphlets. The movement consciously rejected Western formalism in favor of distinctly Korean visual traditions.
