name: Build Lexicon JSON

on:
  push:
    branches: [main]
    paths: ['data/**']
  pull_request:
    branches: [main]
    paths: ['data/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Commit built JSON
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/lexicon.json
          git diff --cached --quiet || git commit -m "chore: rebuild lexicon.json"
          git push
